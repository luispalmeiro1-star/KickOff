<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Hoje Há Jogo" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <style>
      body{background:#0a0a0a;margin:0;}
      #splash{position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.4s;}
      #splash.hide{opacity:0;pointer-events:none;}
      #splash-hoje{font-family:'Arial Black',Arial,sans-serif;font-size:28px;font-weight:900;color:white;letter-spacing:2px;}
      #splash-ha{font-family:'Arial Black',Arial,sans-serif;font-size:28px;font-weight:900;color:white;letter-spacing:2px;}
      #splash-jogo{font-family:'Arial Black',Arial,sans-serif;font-size:52px;font-weight:900;color:#d4af37;letter-spacing:3px;margin-top:4px;}
    </style>
    <title>Hoje Há Jogo</title>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "60b7b224-86fb-4b6e-bc3e-c078cb7bf7c8",
          notifyButton: { enable: false },
          allowLocalhostAsSecureOrigin: true,
          serviceWorkerParam: { scope: "/" },
          serviceWorkerPath: "OneSignalSDKWorker.js",
        });
      });
    </script>
  </head>
  <body>
    <div id="splash">
      <div id="splash-hoje">HOJE HÁ</div>
      <div id="splash-jogo">JOGO</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var s = document.getElementById('splash');
          if(s){ s.classList.add('hide'); setTimeout(function(){ s.remove(); }, 400); }
        }, 1200);
      });
    </script>
  </body>
</html>
